<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fardeen bablu | writing</title>
    <meta name="description" content="Writing by Fardeen Bablu." />
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <script>
      (function () {
        var root = document.documentElement;
        var stored = localStorage.getItem("theme");
        if (stored === "light" || stored === "dark")
          root.setAttribute("data-theme", stored);
        document.addEventListener("DOMContentLoaded", function () {
          var btn = document.getElementById("theme-toggle");
          if (!btn) return;
          btn.addEventListener("click", function () {
            var cur =
              root.getAttribute("data-theme") ||
              (window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light");
            var next = cur === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
          });
        });
      })();
    </script>
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-label="Toggle light or dark theme"
    >
      <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.4A8 8 0 1 1 9.6 4a6.5 6.5 0 0 0 10.4 10.4z" /></svg>
      <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2" /><path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.7 5.3l-1.6 1.6M6.9 17.1l-1.6 1.6M18.7 18.7l-1.6-1.6M6.9 6.9 5.3 5.3" /></svg>
    </button>

    <main>
      <p class="back-link"><a href="/">&larr; back</a></p>
      <h1>Writing</h1>
      <p class="intro">Notes on what I'm building and breaking. Coming soon.</p>
    </main>
  </body>
</html>
